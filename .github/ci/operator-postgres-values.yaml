# E2E values consumed by the "operator + postgres E2E" step in test.yml.
# Not under charts/openfga/ci/ on purpose — chart-testing's helm-test runs
# a gRPC probe immediately after install, which would race the operator's
# scale-up. The dedicated workflow step waits for the migration ConfigMap
# and the scale-up explicitly, then verifies readiness.
replicaCount: 1

operator:
  enabled: true

migration:
  enabled: true

datastore:
  engine: postgres
  uriSecret: openfga-e2e-postgres-credentials

openfga-operator:
  image:
    pullPolicy: Never

extraObjects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: openfga-e2e-postgres-credentials
    stringData:
      uri: "postgres://openfga:changeme@openfga-e2e-postgres:5432/openfga?sslmode=disable"
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: openfga-e2e-postgres
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: openfga-e2e-postgres
      template:
        metadata:
          labels:
            app: openfga-e2e-postgres
        spec:
          containers:
            - name: postgres
              image: postgres:17
              ports:
                - containerPort: 5432
              env:
                - name: POSTGRES_USER
                  value: openfga
                - name: POSTGRES_PASSWORD
                  value: changeme
                - name: POSTGRES_DB
                  value: openfga
                - name: PGDATA
                  value: /var/lib/postgresql/data/pgdata
              volumeMounts:
                - name: data
                  mountPath: /var/lib/postgresql/data
              readinessProbe:
                exec:
                  command: ["pg_isready", "-U", "openfga", "-d", "openfga"]
                initialDelaySeconds: 5
                periodSeconds: 5
          volumes:
            - name: data
              emptyDir: {}
  - apiVersion: v1
    kind: Service
    metadata:
      name: openfga-e2e-postgres
    spec:
      selector:
        app: openfga-e2e-postgres
      ports:
        - port: 5432
          targetPort: 5432
