suite: secondary datastore secrets
templates:
  - templates/secrets.yaml
tests:
  - it: should not render secondary secret when secondary is not configured
    set:
      datastore:
        engine: postgres
        uri: "postgres://user:pass@primary:5432/openfga"
    asserts:
      - hasDocuments:
          count: 1

  - it: should render secondary secret with uri
    set:
      datastore:
        engine: postgres
        uri: "postgres://user:pass@primary:5432/openfga"
        secondary:
          uri: "postgres://user:pass@replica:5432/openfga"
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: "RELEASE-NAME-openfga-secondary-datastore-secret"
        documentIndex: 1
      - isNotNullOrEmpty:
          path: data.uri
        documentIndex: 1

  - it: should render secondary secret with all credentials
    set:
      datastore:
        engine: postgres
        uri: "postgres://user:pass@primary:5432/openfga"
        secondary:
          uri: "postgres://replica:5432/openfga"
          username: replica-user
          password: replica-pass
    asserts:
      - hasDocuments:
          count: 2
      - isNotNullOrEmpty:
          path: data.uri
        documentIndex: 1
      - isNotNullOrEmpty:
          path: data.username
        documentIndex: 1
      - isNotNullOrEmpty:
          path: data.password
        documentIndex: 1

  - it: should not render secondary secret when using existingSecret
    set:
      datastore:
        engine: postgres
        uri: "postgres://user:pass@primary:5432/openfga"
        secondary:
          engine: postgres
          existingSecret: my-existing-secret
          secretKeys:
            uriKey: db-uri
    asserts:
      - hasDocuments:
          count: 1
