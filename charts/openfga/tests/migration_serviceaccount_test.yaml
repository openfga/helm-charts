suite: migration serviceaccount - hook promotion
templates:
  - templates/serviceaccount.yaml
tests:
  - it: promotes the ServiceAccount to a pre-install hook for an externally provided datastore
    set:
      datastore.engine: postgres
      datastore.migrationType: job
      datastore.uriSecret: my-secret
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "pre-install,pre-upgrade"
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-10"
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: "before-hook-creation"

  - it: merges user annotations with the hook annotations
    set:
      datastore.engine: postgres
      datastore.migrationType: job
      datastore.uriSecret: my-secret
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/openfga
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/openfga
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "pre-install,pre-upgrade"

  - it: lets serviceAccount.annotations override the chart's pre-install hook keys
    set:
      datastore.engine: postgres
      datastore.migrationType: job
      datastore.uriSecret: my-secret
      serviceAccount.annotations:
        helm.sh/hook-weight: "-20"
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-20"
      # Keys the user does not set still fall back to the chart defaults.
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "pre-install,pre-upgrade"
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: "before-hook-creation"

  - it: does not promote the ServiceAccount for an in-release datastore (legacy post-* hooks)
    set:
      datastore.engine: postgres
      datastore.migrationType: job
    asserts:
      - notExists:
          path: metadata.annotations["helm.sh/hook"]

  - it: does not promote the ServiceAccount when the bundled subchart is enabled
    set:
      datastore.engine: postgres
      datastore.migrationType: job
      datastore.uriSecret: my-secret
      postgresql.enabled: true
    asserts:
      - notExists:
          path: metadata.annotations["helm.sh/hook"]

  - it: does not promote the ServiceAccount when migrations run as an init container
    set:
      datastore.engine: postgres
      datastore.migrationType: initContainer
      datastore.uriSecret: my-secret
    asserts:
      - notExists:
          path: metadata.annotations["helm.sh/hook"]
