suite: operator mode - service accounts
templates:
  - templates/serviceaccount.yaml
tests:
  - it: should render migration service account when operator is enabled
    set:
      operator.enabled: true
      migration.enabled: true
      migration.serviceAccount.create: true
      serviceAccount.create: true
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: ServiceAccount
        documentIndex: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-openfga-migration
        documentIndex: 1

  - it: should not render migration service account when operator is disabled
    set:
      operator.enabled: false
      serviceAccount.create: true
    asserts:
      - hasDocuments:
          count: 1

  - it: should not render migration service account when migration SA creation is disabled
    set:
      operator.enabled: true
      migration.enabled: true
      migration.serviceAccount.create: false
      migration.serviceAccount.name: external-sa
      serviceAccount.create: true
    asserts:
      - hasDocuments:
          count: 1

  - it: should render migration service account with custom annotations
    set:
      operator.enabled: true
      migration.enabled: true
      migration.serviceAccount.create: true
      migration.serviceAccount.annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/openfga-migrator"
      serviceAccount.create: true
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789012:role/openfga-migrator"
        documentIndex: 1

  - it: should use custom migration service account name
    set:
      operator.enabled: true
      migration.enabled: true
      migration.serviceAccount.create: true
      migration.serviceAccount.name: my-migrator
      serviceAccount.create: true
    asserts:
      - equal:
          path: metadata.name
          value: my-migrator
        documentIndex: 1
