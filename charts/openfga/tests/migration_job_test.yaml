suite: migration job - helm hooks
templates:
  - templates/job.yaml
tests:
  - it: keeps the legacy post-* hooks by default (in-release datastore)
    set:
      datastore.engine: postgres
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "post-install,post-upgrade,post-rollback,post-delete"
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: "before-hook-creation"

  - it: runs as a pre-install/pre-upgrade hook for an externally provided datastore (uriSecret)
    set:
      datastore.engine: postgres
      datastore.uriSecret: my-secret
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "pre-install,pre-upgrade"
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-5"
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: "before-hook-creation"
      - notMatchRegex:
          path: metadata.annotations["helm.sh/hook"]
          pattern: "post-"

  - it: runs as a pre-install/pre-upgrade hook for an externally provided datastore (existingSecret with uriKey)
    set:
      datastore.engine: postgres
      datastore.existingSecret: my-secret
      datastore.secretKeys.uriKey: uri
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "pre-install,pre-upgrade"

  - it: keeps the legacy hooks when existingSecret does not supply the URI (no uriKey)
    set:
      datastore.engine: postgres
      datastore.existingSecret: my-secret
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "post-install,post-upgrade,post-rollback,post-delete"

  - it: keeps the legacy hooks when the bundled subchart is enabled even with an external secret
    set:
      datastore.engine: postgres
      datastore.uriSecret: my-secret
      postgresql.enabled: true
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "post-install,post-upgrade,post-rollback,post-delete"

  - it: is not rendered when migrations run as an init container
    set:
      datastore.engine: postgres
      datastore.uriSecret: my-secret
      datastore.migrationType: initContainer
    asserts:
      - hasDocuments:
          count: 0
