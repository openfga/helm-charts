datastore:
  engine: postgres
  uriSecret: openfga-postgres-credentials
  waitForMigrations: false

extraObjects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: openfga-postgres-credentials
    stringData:
      POSTGRES_USER: openfga
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: openfga
      uri: "postgres://openfga:changeme@openfga-postgres:5432/openfga?sslmode=disable"
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: openfga-postgres
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: openfga-postgres
      template:
        metadata:
          labels:
            app: openfga-postgres
        spec:
          containers:
            - name: postgres
              image: postgres:17
              ports:
                - containerPort: 5432
              envFrom:
                - secretRef:
                    name: openfga-postgres-credentials
              volumeMounts:
                - name: data
                  mountPath: /var/lib/postgresql/data
          volumes:
            - name: data
              emptyDir: {}
  - apiVersion: v1
    kind: Service
    metadata:
      name: openfga-postgres
    spec:
      selector:
        app: openfga-postgres
      ports:
        - port: 5432
          targetPort: 5432
