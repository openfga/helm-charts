{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openfga.serviceAccountName" . }}
  labels:
    {{- include "openfga.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if and .Values.operator.enabled .Values.migration.enabled .Values.migration.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openfga.migrationServiceAccountName" . }}
  labels:
    {{- include "openfga.labels" . | nindent 4 }}
  {{- with .Values.migration.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
