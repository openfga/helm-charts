{{- if .Values.serviceAccount.create -}}
{{- $annotations := .Values.serviceAccount.annotations | default dict -}}
{{- if eq (include "openfga.migrate.usePreInstallHooks" .) "true" -}}
{{/*
Pre-install migration hook needs its ServiceAccount to exist first, or the Job's pod is rejected
("error looking up service account"). Default weight -10 orders it before the Job hook (-5);
serviceAccount.annotations override these defaults.
*/}}
{{- $annotations = mergeOverwrite (dict "helm.sh/hook" "pre-install,pre-upgrade" "helm.sh/hook-weight" "-10" "helm.sh/hook-delete-policy" "before-hook-creation") $annotations -}}
{{- end -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openfga.serviceAccountName" . }}
  labels:
    {{- include "openfga.labels" . | nindent 4 }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
