{{- if and (has .Values.datastore.engine (list "postgres" "mysql")) .Values.datastore.applyMigrations (eq .Values.datastore.migrationType "job") -}}
{{/*
Migration Job hooks default to the legacy post-* events, or to pre-install/pre-upgrade for an
external datastore (see openfga.migrate.usePreInstallHooks) so migrations finish before the
Deployment's wait-for-migration init container blocks — avoiding the post-* --wait/GitOps deadlock
and the post-delete uninstall stall. Keys in migrate.annotations override these defaults.
*/}}
{{- $hooks := dict "helm.sh/hook" "post-install,post-upgrade,post-rollback,post-delete" "helm.sh/hook-weight" "-5" "helm.sh/hook-delete-policy" "before-hook-creation" -}}
{{- if eq (include "openfga.migrate.usePreInstallHooks" .) "true" -}}
{{- $hooks = dict "helm.sh/hook" "pre-install,pre-upgrade" "helm.sh/hook-weight" "-5" "helm.sh/hook-delete-policy" "before-hook-creation" -}}
{{- end -}}
{{- $annotations := mergeOverwrite $hooks (.Values.migrate.annotations | default dict) -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "openfga.fullname" . }}-migrate
  labels:
    {{- include "openfga.labels" . | nindent 4 }}
  {{- with .Values.migrate.labels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  template:
    metadata:
      {{- with $annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "openfga.labels" . | nindent 8 }}
      {{- with .Values.migrate.labels }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openfga.serviceAccountName" . }}
      {{- with .Values.migrate.extraInitContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate-database
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          args: ["migrate"]
          env:
            {{- include "openfga.datastore.envConfig" . | nindent 12 }}

            {{- if .Values.migrate.timeout }}
            - name: OPENFGA_TIMEOUT
              value: "{{ .Values.migrate.timeout }}"
            {{- end }}

            {{- with .Values.extraEnvVars }}
              {{- toYaml . | nindent 12 }}
            {{- end }}

          resources:
            {{- toYaml .Values.datastore.migrations.resources | nindent 12 }}
          {{- with .Values.migrate.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.migrate.sidecars }}
        {{- include "common.tplvalues.render" ( dict "value" .Values.migrate.sidecars "context" $) | nindent 8 }}
        {{- end }}
      restartPolicy: Never
      {{- with .Values.migrate.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  backoffLimit: 1
{{- end }}
