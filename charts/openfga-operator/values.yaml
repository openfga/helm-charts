replicaCount: 1

image:
  repository: ghcr.io/openfga/openfga-operator
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Specifies whether a service account should be created.
  create: true
  # -- Annotations to add to the service account.
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

# -- Namespace to watch for OpenFGA Deployments.
# Leave empty to default to the release namespace.
watchNamespace: ""

leaderElection:
  # -- Enable leader election for controller manager.
  enabled: true

migrationJob:
  # -- Number of pod failures before a migration Job is considered failed.
  backoffLimit: 3
  # -- Maximum wall-clock seconds a migration Job can run before being terminated.
  activeDeadlineSeconds: 300
  # -- Seconds to keep completed/failed Job pods for log inspection before garbage collection.
  ttlSecondsAfterFinished: 300

resources: {}
  # requests:
  #   cpu: 10m
  #   memory: 64Mi
  # limits:
  #   memory: 128Mi

podDisruptionBudget:
  # -- Enable a PodDisruptionBudget for the operator.
  enabled: false
  # -- Minimum number of pods that must be available during disruption.
  # Cannot be set together with maxUnavailable.
  minAvailable: ""
  # -- Maximum number of pods that can be unavailable during disruption.
  # Defaults to 1 when enabled and minAvailable is not set.
  maxUnavailable: 1

nodeSelector: {}

tolerations: []

affinity: {}
