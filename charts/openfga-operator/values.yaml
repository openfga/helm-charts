replicaCount: 1

image:
  repository: openfga/openfga-operator
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Specifies whether a service account should be created.
  create: true
  # -- Annotations to add to the service account.
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

# -- Constrain the operator to watch a single namespace.
# Leave empty to default to the release namespace.
watchNamespace: ""

# -- Watch all namespaces. Overrides watchNamespace.
watchAllNamespaces: false

leaderElection:
  # -- Enable leader election for controller manager.
  enabled: true

resources: {}
  # requests:
  #   cpu: 10m
  #   memory: 64Mi
  # limits:
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
